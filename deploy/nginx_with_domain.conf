# ============================================================
# Nginx config — WITH domain + HTTPS (Let's Encrypt)
# Replace YOUR_DOMAIN with your actual domain, e.g. api.reefsense.com
#
# Install:
#   1. sudo cp nginx_with_domain.conf /etc/nginx/sites-available/reefsense
#   2. sed -i 's/YOUR_DOMAIN/api.reefsense.com/g' /etc/nginx/sites-available/reefsense
#   3. sudo ln -s /etc/nginx/sites-available/reefsense /etc/nginx/sites-enabled/
#   4. sudo rm -f /etc/nginx/sites-enabled/default
#   5. sudo nginx -t && sudo systemctl reload nginx
#   6. sudo certbot --nginx -d YOUR_DOMAIN
# ============================================================

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt challenge — keep this before the redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # Certbot will fill these in automatically after running certbot --nginx
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeout settings (important for ML calls)
        proxy_read_timeout    120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;

        # File upload size limit
        client_max_body_size  20M;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }
}
