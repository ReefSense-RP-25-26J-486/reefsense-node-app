# ============================================================
# Nginx config — NO domain (use VM public IP directly)
# Install: sudo cp nginx_no_domain.conf /etc/nginx/sites-available/reefsense
#          sudo ln -s /etc/nginx/sites-available/reefsense /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name _;   # matches any hostname / bare IP

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Proxy all requests to the Node.js app
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeout settings (important for ML calls which can be slow)
        proxy_read_timeout    120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;

        # File upload size limit (for image uploads)
        client_max_body_size  20M;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }
}
